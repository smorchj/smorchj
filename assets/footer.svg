<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160" role="img" aria-label="Takk for meg">
  <defs>
    <!-- Background -->
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031627"/>
      <stop offset="55%" stop-color="#1e0b3e"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </linearGradient>

    <!-- Glass fill -->
    <linearGradient id="fglass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Neon border -->
    <linearGradient id="fborder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Corner orbs -->
    <radialGradient id="forbLeft">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="forbRight">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <filter id="fblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="160" fill="url(#fbg)"/>

  <!-- Ambient orbs -->
  <circle cx="140" cy="80" r="120" fill="url(#forbLeft)" filter="url(#fblur)"/>
  <circle cx="1060" cy="80" r="120" fill="url(#forbRight)" filter="url(#fblur)"/>

  <!-- Glass panel -->
  <rect x="60" y="34" width="1080" height="92" rx="18" ry="18" fill="url(#fglass)"/>
  <rect x="60" y="34" width="1080" height="92" rx="18" ry="18" fill="none" stroke="url(#fborder)" stroke-width="1.3"/>

  <!-- Decorative quote marks -->
  <text x="98" y="96" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#a855f7" fill-opacity="0.45">"</text>
  <text x="1080" y="116" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#06b6d4" fill-opacity="0.45">"</text>

  <!-- Sign-off -->
  <text x="600" y="96" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" fill="#f5f3ff" letter-spacing="4">TAKK FOR MEG</text>
</svg>
